## render.yaml — GetQuiz single-service Render Blueprint
##
## Deploys the entire stack (FastAPI backend + Vite/React frontend)
## as ONE free web service.  FastAPI serves the built React SPA directly,
## so there is no CORS complexity and no second service to manage.
##
## Deploy steps:
##   1. Push this file to your GitHub repo root.
##   2. Render → New → Blueprint Instance → connect your repo.
##   3. When prompted, fill in the four "sync: false" secret values.
##   4. Click Apply — done.

services:
  - type: web
    name: getquiz
    runtime: python
    buildCommand: "cd frontend && npm ci && npm run build && cd .. && rm -rf backend/static && cp -r frontend/dist backend/static && pip install -r backend/requirements.txt"
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free                         # $0/month; spins down after 15 min idle
    healthCheckPath: /ping             # lightweight probe (no DB hit)
    autoDeploy: true

    envVars:
      # ── Backend secrets (enter values in Render dashboard when prompted) ──────
      - key: DATABASE_URL
        sync: false        # Supabase → Settings → Database → URI

      - key: OPENROUTER_API_KEY
        sync: false        # openrouter.ai → Keys

      - key: GEMINI_API_KEY
        value: ""          # unused by default; leave blank

      # ── Frontend build-time variables (baked in by Vite during build) ─────────
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false        # Clerk dashboard → API Keys (use pk_live_ for production)

      - key: VITE_API_URL
        value: ""          # empty = same-origin relative paths; no CORS needed
